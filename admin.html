<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel · PUNTO SUR SURESTE</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Montserrat:wght@700;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#f4f4f4;color:#1e1e1e;padding:20px}
    .login-box,.admin-panel{max-width:1200px;margin:40px auto;background:white;padding:24px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
    h1{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:800;margin-bottom:20px;border-left:6px solid #C62828;padding-left:16px}
    label{font-weight:600;display:block;margin:12px 0 4px;font-size:13px}
    input,select,textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;font-family:inherit}
    button{background:#C62828;color:white;border:none;padding:10px 20px;border-radius:6px;font-weight:600;cursor:pointer;margin-top:12px}
    button.secondary{background:#2E2E2E}
    table{width:100%;border-collapse:collapse;margin:20px 0}
    th,td{padding:12px;text-align:left;border-bottom:1px solid #ddd}
    .acciones button{margin:0 4px;padding:4px 8px;font-size:12px}
    .msg{padding:10px;margin:12px 0;border-radius:6px}
    .msg.error{background:#ffebee;color:#b71c1c}
    .msg.ok{background:#e8f5e9;color:#1b5e20}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media(max-width:700px){.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="loginSection" class="login-box"><h1>Acceso redacción</h1><label>Token de administrador</label><input type="password" id="tokenInput" placeholder="Ingrese el token"><button onclick="login()">Entrar</button><div id="loginMsg"></div></div>
<div id="adminPanel" style="display:none;" class="admin-panel"><h1>📝 Publicaciones · PUNTO SUR SURESTE</h1><button onclick="mostrarFormulario()" style="margin-bottom:16px;">+ Nueva nota</button><div id="formContainer" style="display:none; border:1px solid #ddd; padding:16px; margin-bottom:20px; border-radius:8px;"></div><div id="listaNotas"></div><button onclick="logout()" class="secondary" style="margin-top:20px;">Cerrar sesión</button></div>
<script>
  const WORKER_URL = "https://puntosur.vinceremx.workers.dev/"; // ← CAMBIE AQUÍ
  let token=null;
  async function fetchAdmin(path,method,body=null){const opts={method,headers:{'Content-Type':'application/json','X-Admin-Token':token}};if(body)opts.body=JSON.stringify(body);const res=await fetch(`${WORKER_URL}${path}`,opts);return await res.json();}
  async function login(){const t=document.getElementById('tokenInput').value.trim();if(!t)return;token=t;try{const data=await fetchAdmin('/api/admin/lista?limit=1','GET');if(data.ok||data.articulos!==undefined){localStorage.setItem('puntosur_token',token);document.getElementById('loginSection').style.display='none';document.getElementById('adminPanel').style.display='block';cargarLista();}else{document.getElementById('loginMsg').innerHTML='<div class="msg error">Token inválido</div>';token=null;}}catch(e){document.getElementById('loginMsg').innerHTML='<div class="msg error">Error de conexión</div>';}}
  async function cargarLista(){const data=await fetchAdmin('/api/admin/lista?limit=100','GET');const arts=data.articulos||[];const html=`<table><thead><tr><th>ID</th><th>Título</th><th>Categoría</th><th>Autor</th><th>Principal</th><th>Fecha</th><th>Acciones</th></tr></thead><tbody>${arts.map(a=>`<tr><td>${a.id}</td><td>${a.titulo.substring(0,60)}</td><td>${a.categoria}</td><td>${a.autor}</td><td>${a.es_principal?'✅':'❌'}</td><td>${new Date(a.timestamp).toLocaleDateString()}</td><td class="acciones"><button onclick="editarNota(${a.id})">Editar</button><button onclick="eliminarNota(${a.id})">Eliminar</button></td></tr>`).join('')}</tbody></table>`;document.getElementById('listaNotas').innerHTML=html;}
  async function eliminarNota(id){if(!confirm('¿Eliminar permanentemente?'))return;const res=await fetchAdmin(`/api/admin/eliminar?id=${id}`,'DELETE');if(res.ok)cargarLista();else alert('Error al eliminar');}
  function mostrarFormulario(nota=null){const isEdit=!!nota;const container=document.getElementById('formContainer');container.innerHTML=`<h3>${isEdit?'Editar nota':'Nueva nota'}</h3><div class="form-row"><div><label>Título *</label><input id="titulo" value="${nota?.titulo||''}"></div><div><label>Categoría</label><select id="categoria"><option>Sureste</option><option>Nacional</option><option>Seguridad</option><option>Deportes</option></select></div></div><div><label>Resumen</label><textarea id="resumen" rows="2">${nota?.resumen||''}</textarea></div><div><label>Cuerpo completo</label><textarea id="cuerpo" rows="8">${nota?.cuerpo||''}</textarea></div><div class="form-row"><div><label>Autor</label><input id="autor" value="${nota?.autor||'Redacción Punto Sur'}"></div><div><label>Cargo</label><input id="cargo" value="${nota?.cargo||''}"></div></div><div class="form-row"><div><label>URL imagen principal</label><input id="imgUrl" value="${nota?.img_url||''}"></div><div><label>URL miniatura</label><input id="imgSmall" value="${nota?.img_small||''}"></div></div><div><label style="display:inline-block; margin-right:12px;"><input type="checkbox" id="esPrincipal" ${nota?.es_principal?'checked':''}> Marcar como principal</label></div><button onclick="guardarNota(${isEdit?nota.id:'null'})">${isEdit?'Actualizar':'Publicar'}</button><button onclick="cancelarForm()" class="secondary">Cancelar</button>`;if(isEdit)document.getElementById('categoria').value=nota.categoria;container.style.display='block';}
  async function guardarNota(id){const data={titulo:document.getElementById('titulo').value.trim(),resumen:document.getElementById('resumen').value,cuerpo:document.getElementById('cuerpo').value,categoria:document.getElementById('categoria').value,autor:document.getElementById('autor').value||'Redacción Punto Sur',cargo:document.getElementById('cargo').value,esPrincipal:document.getElementById('esPrincipal').checked,imgUrl:document.getElementById('imgUrl').value,imgSmall:document.getElementById('imgSmall').value};if(!data.titulo)return alert('El título es obligatorio');let res;if(id){data.id=id;res=await fetchAdmin('/api/admin/editar','PUT',data);}else{res=await fetchAdmin('/api/admin/publicar','POST',data);}if(res.ok){cancelarForm();cargarLista();}else{alert('Error: '+(res.error||'desconocido'));}}
  async function editarNota(id){const data=await fetch(`${WORKER_URL}/api/noticia?id=${id}`).then(r=>r.json());if(data.articulo)mostrarFormulario(data.articulo);}
  function cancelarForm(){document.getElementById('formContainer').style.display='none';}
  function logout(){localStorage.removeItem('puntosur_token');location.reload();}
  const saved=localStorage.getItem('puntosur_token');if(saved){token=saved;document.getElementById('loginSection').style.display='none';document.getElementById('adminPanel').style.display='block';cargarLista();}
</script>
</body>
</html>
