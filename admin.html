<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel · PUNTO SUR SURESTE</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui;background:#f4f4f4;padding:20px}
    .login-box,.admin-panel{max-width:1200px;margin:40px auto;background:white;padding:24px;border-radius:8px}
    h1{border-left:6px solid #C62828;padding-left:16px;margin-bottom:20px}
    input,textarea,select{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:6px}
    button{background:#C62828;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer}
    button.secondary{background:#2E2E2E}
    table{width:100%;border-collapse:collapse;margin-top:20px}
    th,td{padding:10px;text-align:left;border-bottom:1px solid #ddd}
    .error{color:#b71c1c;background:#ffebee;padding:10px;margin-top:10px}
    .debug{background:#f0f0f0;padding:8px;font-size:12px;margin-top:10px;word-break:break-all}
  </style>
</head>
<body>
<div id="loginSection" class="login-box">
  <h1>Acceso redacción</h1>
  <label>Token de administrador</label>
  <input type="password" id="tokenInput" placeholder="000204">
  <button onclick="login()">Entrar</button>
  <div id="loginMsg"></div>
  <div class="debug" id="debugInfo"></div>
</div>
<div id="adminPanel" style="display:none;" class="admin-panel">
  <h1>📝 Publicaciones</h1>
  <button onclick="mostrarFormulario()">+ Nueva nota</button>
  <div id="formContainer" style="display:none; border:1px solid #ddd; padding:16px; margin:20px 0;"></div>
  <div id="listaNotas"></div>
  <button onclick="logout()" class="secondary">Cerrar sesión</button>
</div>
<script>
  const WORKER_URL = "https://puntosur.vinceremx.workers.dev"; // ← VERIFIQUE QUE SEA ESTA URL
  let token = null;

  async function fetchAdmin(path, method, body = null) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${WORKER_URL}${path}`, opts);
    return await res.json();
  }

  async function login() {
    const t = document.getElementById('tokenInput').value.trim();
    if (!t) return;
    token = t;
    document.getElementById('debugInfo').innerHTML = `Enviando token: "${token}" a ${WORKER_URL}/api/admin/lista`;
    try {
      const data = await fetchAdmin('/api/admin/lista?limit=1', 'GET');
      document.getElementById('debugInfo').innerHTML += `<br>Respuesta: ${JSON.stringify(data)}`;
      if (data.ok === true || data.articulos !== undefined) {
        localStorage.setItem('puntosur_token', token);
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        cargarLista();
      } else {
        document.getElementById('loginMsg').innerHTML = '<div class="error">Token inválido. Respuesta: ' + JSON.stringify(data) + '</div>';
        token = null;
      }
    } catch(e) {
      document.getElementById('loginMsg').innerHTML = '<div class="error">Error de conexión: ' + e.message + '</div>';
      token = null;
    }
  }

  async function cargarLista() {
    const data = await fetchAdmin('/api/admin/lista?limit=100', 'GET');
    const arts = data.articulos || [];
    const html = `<table><thead><tr><th>ID</th><th>Título</th><th>Categoría</th><th>Autor</th><th>Principal</th><th>Fecha</th><th>Acciones</th></tr></thead><tbody>
      ${arts.map(a => `<tr><td>${a.id}</td><td>${a.titulo.substring(0,60)}</td><td>${a.categoria}</td><td>${a.autor}</td><td>${a.es_principal?'✅':'❌'}</td><td>${new Date(a.timestamp).toLocaleDateString()}</td><td><button onclick="editarNota(${a.id})">Editar</button> <button onclick="eliminarNota(${a.id})">Eliminar</button></td>`).join('')}
    </tbody></table>`;
    document.getElementById('listaNotas').innerHTML = html;
  }

  async function eliminarNota(id) {
    if(!confirm('¿Eliminar?')) return;
    const res = await fetchAdmin(`/api/admin/eliminar?id=${id}`, 'DELETE');
    if(res.ok) cargarLista();
    else alert('Error');
  }

  function mostrarFormulario(nota = null) {
    const isEdit = !!nota;
    const container = document.getElementById('formContainer');
    container.innerHTML = `
      <h3>${isEdit ? 'Editar' : 'Nueva nota'}</h3>
      <input id="titulo" placeholder="Título *" value="${nota?.titulo || ''}">
      <select id="categoria"><option>Sureste</option><option>Nacional</option><option>Seguridad</option><option>Deportes</option></select>
      <textarea id="resumen" rows="2" placeholder="Resumen">${nota?.resumen || ''}</textarea>
      <textarea id="cuerpo" rows="6" placeholder="Cuerpo">${nota?.cuerpo || ''}</textarea>
      <input id="autor" placeholder="Autor" value="${nota?.autor || 'Redacción Punto Sur'}">
      <input id="cargo" placeholder="Cargo" value="${nota?.cargo || ''}">
      <input id="imgUrl" placeholder="URL imagen principal" value="${nota?.img_url || ''}">
      <input id="imgSmall" placeholder="URL miniatura" value="${nota?.img_small || ''}">
      <label><input type="checkbox" id="esPrincipal" ${nota?.es_principal ? 'checked' : ''}> Marcar como principal</label>
      <button onclick="guardarNota(${isEdit ? nota.id : 'null'})">${isEdit ? 'Actualizar' : 'Publicar'}</button>
      <button onclick="cancelarForm()" class="secondary">Cancelar</button>
    `;
    if(isEdit) document.getElementById('categoria').value = nota.categoria;
    container.style.display = 'block';
  }

  async function guardarNota(id) {
    const data = {
      titulo: document.getElementById('titulo').value.trim(),
      resumen: document.getElementById('resumen').value,
      cuerpo: document.getElementById('cuerpo').value,
      categoria: document.getElementById('categoria').value,
      autor: document.getElementById('autor').value || 'Redacción Punto Sur',
      cargo: document.getElementById('cargo').value,
      esPrincipal: document.getElementById('esPrincipal').checked,
      imgUrl: document.getElementById('imgUrl').value,
      imgSmall: document.getElementById('imgSmall').value
    };
    if(!data.titulo) return alert('Título obligatorio');
    let res;
    if(id) { data.id = id; res = await fetchAdmin('/api/admin/editar', 'PUT', data); }
    else { res = await fetchAdmin('/api/admin/publicar', 'POST', data); }
    if(res.ok) { cancelarForm(); cargarLista(); }
    else alert('Error: ' + (res.error || 'desconocido'));
  }

  async function editarNota(id) {
    const data = await fetch(`${WORKER_URL}/api/noticia?id=${id}`).then(r=>r.json());
    if(data.articulo) mostrarFormulario(data.articulo);
  }

  function cancelarForm() { document.getElementById('formContainer').style.display = 'none'; }
  function logout() { localStorage.removeItem('puntosur_token'); location.reload(); }

  // Limpiar localStorage antiguo al cargar la página
  const saved = localStorage.getItem('puntosur_token');
  if(saved) {
    // Opcional: mostrar un mensaje
    console.log("Token guardado encontrado:", saved);
    token = saved;
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    cargarLista();
  }
</script>
</body>
</html>
